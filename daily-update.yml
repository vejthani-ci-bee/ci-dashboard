name: Daily CI Dashboard Update

on:
  schedule:
    # 08:00 น. เวลาไทย (UTC+7) = 01:00 UTC ทุกวัน
    - cron: '0 1 * * *'
  workflow_dispatch:
    # อนุญาตให้กด "Run workflow" ด้วยตัวเองได้

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run CI Dashboard Update
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_dashboard.py

      - name: Commit and push changes
        run: |
          git config --local user.email "ci-bot@vejthani.com"
          git config --local user.name "CI Dashboard Bot"
          git add index.html
          git diff --staged --quiet || git commit -m "🏥 Auto-update CI Dashboard $(TZ='Asia/Bangkok' date +'%d/%m/%Y %H:%M น.')"
          git push
