name: Daily CI Dashboard Update

on:
  schedule:
    - cron: '0 0 * * *' # รันอัตโนมัติทุกวันเวลา 07:00 น. (เวลาไทย)
  workflow_dispatch: # ปุ่มสำหรับกดรันเอง (Manual Run)

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Update Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python update_dashboard.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add index.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "📊 อัปเดตข้อมูลและระบบวันที่ประจำวัน [Automated]" && git push)
